<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VS Code Assistant Launcher</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #1e1e1e;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px 20px;
    }

    .vscode-icon {
      width: 90px;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 1.6rem;
      margin-bottom: 20px;
      background: linear-gradient(-45deg, #5a9dfb, #ab47bc, #7c4dff);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientMove 5s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .input-group {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background-color: #2c2c2c;
      color: white;
      font-size: 14px;
    }

    input[type="file"] {
      color: #ccc;
    }

    button {
      padding: 10px 20px;
      font-size: 14px;
      background-color: #007acc;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #005fa3;
    }

    pre {
      background: #2c2c2c;
      padding: 10px;
      border-radius: 8px;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }

    .status {
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <img src="/static/images/vscode.png" alt="VS Code Icon" class="vscode-icon" />
  <h2>VS Code Assistant Launcher</h2>

  <div class="input-group">
    <input type="text" id="vscodePath" placeholder="Enter VS Code executable path" />

    <input type="file" id="codeFile" />
    <textarea id="promptInput" rows="4" placeholder="Ask a question about the code..."></textarea>

    <button onclick="askAssistant()">Ask Assistant</button>
    <button onclick="launchVSCode()">Launch VSCode</button>

    <pre id="responseBox">Awaiting input...</pre>
  </div>

  <script>
    async function launchVSCode() {
      const vscodePath = document.getElementById("vscodePath").value.trim();
      const statusBox = document.getElementById("responseBox");

      if (!vscodePath) {
        statusBox.textContent = "❗ Please enter the VSCode executable path.";
        return;
      }

      try {
        const res = await fetch("/vscode/launch-vscode", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ path: vscodePath })
        });

        const data = await res.json();
        statusBox.textContent = `${data.status.toUpperCase()}: ${data.message}`;
      } catch (err) {
        console.error(err);
        statusBox.textContent = "⚠️ Could not reach backend.";
      }
    }

    async function askAssistant() {
      const fileInput = document.getElementById("codeFile");
      const prompt = document.getElementById("promptInput").value.trim();
      const responseBox = document.getElementById("responseBox");

      if (!fileInput.files.length) {
        responseBox.textContent = "❗ Please upload a code file.";
        return;
      }

      const formData = new FormData();
      formData.append("file", fileInput.files[0]);
      formData.append("prompt", prompt);

      try {
        const res = await fetch("/ask-code", {
          method: "POST",
          body: formData
        });

        const data = await res.json();
        responseBox.textContent = data.response || "No response.";
      } catch (err) {
        console.error(err);
        responseBox.textContent = "⚠️ Could not contact assistant.";
      }
    }
  </script>
</body>
</html>
